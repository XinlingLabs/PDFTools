name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 升级到 checkout v5 (支持 Node.js 24)
      - name: Checkout
        uses: actions/checkout@v5

      # 2. 调试步骤 - 确认文件存在
      - name: List Files
        run: |
          Write-Host "当前目录文件列表:"
          Get-ChildItem
          if (Test-Path "icon.ico") {
              Write-Host "✅ 找到 icon.ico"
          } else {
              Write-Host "❌ 未找到 icon.ico"
          }

      # 3. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. 安装依赖
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 5. 构建 EXE
      - name: Build EXE
        run: |
          $params = @(
            "-w",
            "-i", "icon.ico",
            "--add-data", "icon.ico;.",
            "--collect-all", "tkinterdnd2",
            "--name", "PDFTools",
            "pdf_tools.py"
          )
          pyinstaller @params

      # 6. 升级到 upload-artifact v5 (支持 Node.js 24)
      - name: Upload EXE
        uses: actions/upload-artifact@v5
        with:
          name: PDFTools_Folder
          path: dist/PDFTools/
